# =============================================================================
# GitHub Labels Configuration
# Synced by .github/workflows/labels.yml using crazy-max/ghaction-github-labeler
# =============================================================================

# --- Type labels ---
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Documentation improvements"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

# --- Status labels ---
- name: "needs-triage"
  color: "e4e669"
  description: "Issue needs initial review and categorization"

- name: "needs-info"
  color: "fbca04"
  description: "Waiting for more information from the reporter"

- name: "confirmed"
  color: "0e8a16"
  description: "Issue has been confirmed and is ready for work"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"

# --- Area labels ---
- name: "area: setup"
  color: "c5def5"
  description: "Config flow, API connection, authentication"

- name: "area: system"
  color: "c5def5"
  description: "CPU, RAM, uptime, temperature sensors"

- name: "area: storage"
  color: "c5def5"
  description: "Array, disks, parity, shares"

- name: "area: docker"
  color: "c5def5"
  description: "Docker container switches and sensors"

- name: "area: vm"
  color: "c5def5"
  description: "Virtual machine switches and sensors"

- name: "area: ups"
  color: "c5def5"
  description: "UPS monitoring sensors"

- name: "area: notifications"
  color: "c5def5"
  description: "Unraid notification entities"

- name: "area: infra"
  color: "c5def5"
  description: "Services, registration, plugins, cloud"

- name: "area: websocket"
  color: "c5def5"
  description: "WebSocket subscriptions and real-time data"

# --- Priority labels ---
- name: "priority: critical"
  color: "b60205"
  description: "Integration broken or data loss risk"

- name: "priority: high"
  color: "d93f0b"
  description: "Major functionality impacted"

- name: "priority: medium"
  color: "fbca04"
  description: "Minor functionality or cosmetic issue"

- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have, no urgency"

# --- Workflow labels ---
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "pinned"
  color: "006b75"
  description: "Pinned issue, exempt from stale bot"

- name: "work-in-progress"
  color: "ededed"
  description: "PR is still being worked on"

- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"

- name: "upstream"
  color: "bfdadc"
  description: "Issue in unraid-api library or Unraid server"
