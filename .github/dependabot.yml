version: 2
updates:
  # Maintain devcontainer base image
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]

  # Maintain Python dependencies via uv (updates pyproject.toml + uv.lock)
  # Daily schedule ensures Home Assistant releases are picked up quickly
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      # HA core + test framework must stay in sync — bump together
      homeassistant-stack:
        patterns:
          - "homeassistant"
          - "pytest-homeassistant-custom-component"
      # Linting / formatting tools
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
      # Testing utilities
      testing:
        patterns:
          - "pytest*"
          - "syrupy"
          - "coverage*"
